# detekt configuration — MLBB Draft Assistant
# Version: 1.23.8
# Run:          ./gradlew detekt
# Gen baseline: ./gradlew detektBaseline
#
# Strategy: build on defaults, tighten key rules, suppress known large
# legacy files (OverlayService) in the baseline rather than in this config
# so new violations are always flagged.

build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    LongParameterList: 1

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'

output-reports:
  active: true
  exclude: []

# ── Complexity ────────────────────────────────────────────────────────────────
complexity:
  active: true

  ComplexMethod:
    active: true
    threshold: 15
    ignoreSingleWhenExpression: true
    ignoreSimpleWhenEntries: true
    ignoreNestingFunctions: false

  LongMethod:
    active: true
    threshold: 60
    ignoreAnnotated:
      - 'Composable'

  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotated:
      - 'Composable'
      - 'AssistedInject'
      - 'Inject'

  TooManyFunctions:
    active: true
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
    thresholdInFiles: 30
    thresholdInClasses: 25
    thresholdInInterfaces: 15
    thresholdInObjects: 20
    thresholdInEnums: 10
    ignoreDeprecated: true
    ignorePrivate: false
    ignoreOverridden: true

  LargeClass:
    active: true
    threshold: 800
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
      # OverlayService (~1100 LOC) is tracked as P1-03 (deferred refactor).
      # Remove this exclusion once the decomposition is complete.
      - '**/overlay/OverlayService.kt'

  NestedBlockDepth:
    active: true
    threshold: 4

  CyclomaticComplexMethod:
    active: true
    threshold: 15
    ignoreSingleWhenExpression: true

# ── Naming ────────────────────────────────────────────────────────────────────
naming:
  active: true

  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'
    ignoreAnnotated:
      - 'Composable'

  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
    privateVariablePattern: '_?[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'

  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'

  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'

# ── Code smell ────────────────────────────────────────────────────────────────
code-smell:
  active: true

  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '100'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreNamedArgument: true
    ignoreEnums: true
    ignoreRanges: false
    ignoreExtensionFunctions: true

# ── Style ─────────────────────────────────────────────────────────────────────
style:
  active: true

  MagicNumber:
    active: false   # covered above in code-smell section

  WildcardImport:
    active: true
    excludeImports:
      - 'kotlinx.coroutines.*'
      - 'androidx.compose.*'
      - 'com.mlbb.assistant.presentation.common.theme.*'

  UnusedImports:
    active: true

  UnusedPrivateMember:
    active: true
    allowedNames: '(_|ignored|expected|serialVersionUID)'

  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
    excludeRawStrings: true

  FunctionOnlyReturningConstant:
    active: true
    ignoreOverridableFunction: true
    ignoreActualFunction: true

  SpacingBetweenPackageAndImports:
    active: true

  NewLineAtEndOfFile:
    active: true

  TrailingWhitespace:
    active: true

  NoTabs:
    active: true

# ── Potential bugs ────────────────────────────────────────────────────────────
potential-bugs:
  active: true

  AvoidReferentialEquality:
    active: true
    forbiddenTypePatterns:
      - 'kotlin.String'

  CastToNullableType:
    active: true

  DontDowncastCollectionTypes:
    active: true

  EqualsAlwaysReturnsTrueOrFalse:
    active: true

  ExplicitGarbageCollectionCall:
    active: true

  HasPlatformType:
    active: true

  IgnoredReturnValue:
    active: true
    restrictToAnnotatedMethods: true
    returnValueAnnotations:
      - '*.CheckResult'
      - '*.CheckReturnValue'

  ImplicitDefaultLocale:
    active: true
    excludes:
      - '**/test/**'

  InvalidRange:
    active: true

  MissingPackageDeclaration:
    active: true
    excludes:
      - '**/*.kts'

  NullCheckOnMutableProperty:
    active: true

  NullableToStringCall:
    active: true

  UnconditionalJumpStatementInLoop:
    active: true

  UnnecessaryNotNullCheck:
    active: true

  UnnecessaryNotNullOperator:
    active: true

  UnnecessarySafeCall:
    active: true

  UnreachableCatchBlock:
    active: true

  UnreachableCode:
    active: true

  UnsafeCallOnNullableType:
    active: true
    excludes:
      - '**/test/**'
      - '**/androidTest/**'

  UnsafeCast:
    active: true

  UselessPostfixExpression:
    active: true

# ── Performance ───────────────────────────────────────────────────────────────
performance:
  active: true

  ArrayPrimitive:
    active: true

  CouldBeSequence:
    active: true
    threshold: 3

  ForEachOnRange:
    active: true
    excludes:
      - '**/test/**'

  SpreadOperator:
    active: true
    excludes:
      - '**/test/**'

  UnnecessaryTemporaryInstantiation:
    active: true

# ── Coroutines ────────────────────────────────────────────────────────────────
coroutines:
  active: true

  GlobalCoroutineUsage:
    active: true

  InjectDispatcher:
    active: true
    dispatcherNames:
      - 'IO'
      - 'Default'
      - 'Unconfined'

  RedundantSuspendModifier:
    active: true

  SleepInsteadOfDelay:
    active: true

  SuspendFunWithCoroutineScopeReceiver:
    active: true

  SuspendFunWithFlowReturnType:
    active: true

# ── Empty blocks ──────────────────────────────────────────────────────────────
empty-blocks:
  active: true

  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|(ignored|expected)'

  EmptyClassBlock:
    active: true

  EmptyDefaultConstructor:
    active: true

  EmptyDoWhileBlock:
    active: true

  EmptyElseBlock:
    active: true

  EmptyFinallyBlock:
    active: true

  EmptyForBlock:
    active: true

  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

  EmptyIfBlock:
    active: true

  EmptyInitBlock:
    active: true

  EmptyKotlinFile:
    active: true

  EmptySecondaryConstructor:
    active: true

  EmptyTryBlock:
    active: true

  EmptyWhenBlock:
    active: true

  EmptyWhileBlock:
    active: true

# ── Exceptions ────────────────────────────────────────────────────────────────
exceptions:
  active: true

  ExceptionRaisedInUnexpectedLocation:
    active: true
    methodNames:
      - 'equals'
      - 'finalize'
      - 'hashCode'
      - 'toString'

  InstanceOfCheckForException:
    active: true
    excludes:
      - '**/test/**'

  ObjectExtendsThrowable:
    active: true

  PrintStackTrace:
    active: true

  RethrowCaughtException:
    active: true

  ReturnFromFinally:
    active: true
    ignoreLabeled: false

  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'MalformedURLException'
      - 'NumberFormatException'
      - 'ParseException'
    allowedExceptionNameRegex: '_|(ignored|expected)'

  ThrowingExceptionFromFinally:
    active: true

  ThrowingExceptionInMain:
    active: true

  ThrowingExceptionsWithoutMessageOrCause:
    active: true
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
    exceptions:
      - 'ArrayIndexOutOfBoundsException'
      - 'Exception'
      - 'IllegalArgumentException'
      - 'IllegalMonitorStateException'
      - 'IllegalStateException'
      - 'IndexOutOfBoundsException'
      - 'NullPointerException'
      - 'RuntimeException'
      - 'Throwable'

  ThrowingNewInstanceOfSameException:
    active: true

  TooGenericExceptionCaught:
    active: true
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
    exceptionNames:
      - 'ArrayIndexOutOfBoundsException'
      - 'Error'
      - 'Exception'
      - 'IllegalMonitorStateException'
      - 'IndexOutOfBoundsException'
      - 'NullPointerException'
      - 'RuntimeException'
      - 'Throwable'
    allowedExceptionNameRegex: '_|(ignored|expected)'

  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'RuntimeException'
      - 'Throwable'
