name: MLBB Assistant - Full Code Review & Auto-Fix PR

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level for tools'
        required: false
        default: 'info'
        type: choice
        options:
          - debug
          - info
          - warn

permissions:
  contents: write
  pull-requests: write

jobs:
  review-and-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # 1. Checkout main branch with full history (required by SonarCloud)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. Set up JDK 17 (required for modern Android Gradle)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache Gradle dependencies for faster runs
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Run static analysis with SonarCloud (requires SONAR_TOKEN secret)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=YOUR_ORG
            -Dsonar.projectKey=YOUR_PROJECT_KEY
            -Dsonar.branch.name=main
            -Dsonar.verbose=${{ inputs.log_level == 'debug' && 'true' || 'false' }}
            -Dsonar.kotlin.detekt.reportPaths=build/reports/detekt/detekt.xml
            -Dsonar.kotlin.ktlint.reportPaths=build/reports/ktlint/ktlint.xml

      # 5. GitHub CodeQL (supports Java/Kotlin)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'java-kotlin'
          queries: security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 6. Install and run ktlint for code style checking and auto-formatting
      - name: Setup ktlint
        uses: ScaCap/action-ktlint@v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-check
          level: ${{ inputs.log_level }}
          fail_on_error: false
      - name: Run ktlint auto-format
        run: |
          ktlint -F "**/*.kt"

      # 7. Install and run detekt for static analysis with auto-correct
      - name: Setup detekt
        uses: natiginfo/action-detekt-all@v1
        with:
          args: --auto-correct --input ${{ github.workspace }}
      - name: Run detekt with reviewdog
        uses: natiginfo/action-detekt-all@v1
        with:
          args: --input ${{ github.workspace }}
          reviewdog_reporter: github-check

      # 8. Run Android Lint and generate report
      - name: Run Android Lint
        run: ./gradlew lint

      # 9. Create pull request with all auto-fixed changes
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 Auto-fix from full code review"
          branch: ci/auto-review-fixes
          base: main
          title: "🤖 Automated fixes from code review"
          body: |
            This PR was automatically created after a manual workflow run.
            It applies:
            - `ktlintFormat` (Kotlin coding style)
            - `detekt --auto-correct` (static analysis fixes)
            - Any other file modifications made during the review process

            ⚠️ **Please review** – auto-fix tools are not perfect.
          delete-branch: true
