name: DeepSeek Systemic Code Review & PR

on:
  workflow_dispatch:          # manual trigger
  # push:
  #   branches: [ main ]       # optional: auto-run on main push

permissions:
  contents: write             # to push a new branch
  pull-requests: write        # to create PR

jobs:
  review-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history for accurate diffs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai PyGithub

      - name: Run DeepSeek systemic review and generate fixes
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.DEFAULT_PAT }}   # needs repo & PR write
          REPO_FULL_NAME: ${{ github.repository }}
          BASE_BRANCH: ${{ github.ref_name }}        # main or default branch
        run: python scripts/deepseek_systemic_review.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DEFAULT_PAT }}
          commit-message: "🤖 DeepSeek: systemic code review & logic refinements"
          branch: deepseek-systemic-review
          title: "[AI] DeepSeek systemic improvements"
          body: |
            This PR was automatically generated by DeepSeek AI.
            It performed a systematic review of the entire codebase and applied fixes/logic refinements.
            Please review carefully before merging.
          labels: ai-generated, automated-pr
