name: Gemini Full Android Repo Review

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  review-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai PyGithub

      - name: Run systematic review and fix generation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL_NAME: ${{ github.repository }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: python scripts/python.001.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 Gemini: systematic code review & fixes"
          branch: gemini-systemic-review
          title: "[AI] Gemini Full Repository Improvements"
          body: |
            This PR was automatically generated by Gemini 1.5 Flash.
            The AI reviewed every file in the repository and applied fixes for:
            - Null safety & Kotlin idioms
            - Coroutine & concurrency issues
            - Memory leaks & lifecycle
            - Jetpack Compose best practices
            - Performance & security
            - Gradle dependency hygiene
            Please verify the changes carefully before merging.
          labels: ai-generated