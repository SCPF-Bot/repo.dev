name: Download Lottie Animations

on:
  workflow_dispatch:   # manual trigger
  # Uncomment the next line to run on every push (not recommended for large assets)
  # push:
  #   branches: [ main ]

jobs:
  download-animations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create raw directory if it doesn’t exist
        run: mkdir -p app/src/main/res/raw

      - name: Download Pulse Animation
        run: |
          curl -L -o app/src/main/res/raw/pulse_animation.json \
            "https://assets-v2.lottiefiles.com/a/d823da7e-62a8-11ee-9201-037657d32181/hWJI1QvWut.json"

      - name: Download Loading Spinner Animation
        run: |
          curl -L -o app/src/main/res/raw/loading_animation.json \
            "https://assets-v2.lottiefiles.com/a/67204b42-7e92-44b9-bc8c-0064ac9140db/tSljh4DK83.json"

      - name: Verify files exist
        run: |
          ls -lh app/src/main/res/raw/

      - name: Commit and push if files changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/res/raw/
          git diff --cached --quiet || git commit -m "Download Lottie animation assets"
          git push
