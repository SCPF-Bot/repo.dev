# .github/workflows/create-structure.yml
name: Create Project Directory Structure

on:
  workflow_dispatch:

jobs:
  create-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create all directories and add .gitkeep placeholders
        run: |
          # Top-level directories
          mkdir -p .github/workflows
          mkdir -p .devcontainer
          mkdir -p docs

          # App source directories (main)
          mkdir -p app/src/main/java/com/example/mlbbdraftassistant/data/model
          mkdir -p app/src/main/java/com/example/mlbbdraftassistant/data/remote
          mkdir -p app/src/main/java/com/example/mlbbdraftassistant/data/local
          mkdir -p app/src/main/java/com/example/mlbbdraftassistant/data/repository
          mkdir -p app/src/main/java/com/example/mlbbdraftassistant/domain
          mkdir -p app/src/main/java/com/example/mlbbdraftassistant/ui/overlay
          mkdir -p app/src/main/java/com/example/mlbbdraftassistant/ui/settings
          mkdir -p app/src/main/java/com/example/mlbbdraftassistant/ui/theme
          mkdir -p app/src/main/java/com/example/mlbbdraftassistant/util

          # App resource directories
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/raw

          # Test directories
          mkdir -p app/src/test/java/com/example/mlbbdraftassistant
          mkdir -p app/src/androidTest/java/com/example/mlbbdraftassistant

          # Gradle wrapper directory
          mkdir -p gradle/wrapper

          # Add .gitkeep to every empty directory (Git doesn't track empty folders)
          find . -type d -empty -exec touch {}/.gitkeep \;

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Initialize project directory structure with .gitkeep files" || echo "No changes to commit"
          git push
