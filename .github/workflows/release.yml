name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept Android SDK licenses and install Platform 36
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36"

      - name: Generate ephemeral signing keystore
        run: |
          keytool -genkeypair \
            -keystore release-key.jks \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -storepass android \
            -keypass android \
            -dname "CN=CI Build, OU=Dev, O=MLBB Assistant, L=Unknown, S=Unknown, C=US"

      - name: Build release APK (minified + resource-shrunk)
        run: ./gradlew assembleRelease --no-daemon

      - name: Align APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/zipalign \
            -v 4 "$APK" app-release-aligned.apk

      - name: Sign APK
        run: |
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner sign \
            --ks release-key.jks \
            --ks-key-alias release \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-release-signed.apk \
            app-release-aligned.apk

      - name: Verify signed APK
        run: |
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner verify \
            --verbose app-release-signed.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlbb-assistant-release
          path: app-release-signed.apk
          retention-days: 30
