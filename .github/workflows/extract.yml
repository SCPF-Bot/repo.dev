name: Extract 7z

on:
  push:
    paths:
      - '*.7z'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache 7zz binary
        id: cache-7zz
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/7zz
          key: 7zz-2409

      - name: Install 7zz
        if: steps.cache-7zz.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          wget https://www.7-zip.org/a/7z2409-linux-x64.tar.xz
          tar -xf 7z2409-linux-x64.tar.xz
          cp 7zz ~/.local/bin/
          chmod +x ~/.local/bin/7zz

      - name: Add 7zz to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Delete all files/folders except .github, .git, and *.7z
        run: |
          find . -mindepth 1 -maxdepth 1 \
          ! -name '.github' \
          ! -name '.git' \
          ! -name '*.7z' \
          -exec rm -rf {} +
        working-directory: ${{ github.workspace }}

      - name: Extract all .7z archives
        run: |
          for archive in *.7z; do
            if [ -f "$archive" ]; then
              echo "Extracting $archive"
              7zz x -y "$archive"
            fi
          done
        working-directory: ${{ github.workspace }}

      - name: Delete extracted .7z files
        run: rm -f *.7z
        working-directory: ${{ github.workspace }}

      - name: Commit and push changes to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Extract 7z archive and cleanup [skip ci]"
            git push origin main
          fi
