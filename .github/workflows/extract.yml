name: Extract 7z

on:
  workflow_dispatch:   # Manual trigger to avoid accidental pushes

permissions:
  contents: write      # Required to push changes back to the repository

jobs:
  extract-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install p7zip (7z extraction tool)
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Delete all files/folders except .github, .git, and *.7z
        run: |
          # Remove everything in the current directory except:
          # - .github folder
          # - .git folder (required for commit/push)
          # - any .7z files
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.github' \
            ! -name '.git' \
            ! -name '*.7z' \
            -exec rm -rf {} +
        working-directory: ${{ github.workspace }}

      - name: Extract all .7z archives
        run: |
          for archive in *.7z; do
            if [ -f "$archive" ]; then
              echo "Extracting $archive"
              7z x -y "$archive"   # -y auto‑yes to overwrite files
            fi
          done
        working-directory: ${{ github.workspace }}

      - name: Delete extracted .7z files
        run: rm -f *.7z
        working-directory: ${{ github.workspace }}

      - name: Commit and push changes to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Extract 7z archive and cleanup [skip ci]"
            git push origin main
          fi
