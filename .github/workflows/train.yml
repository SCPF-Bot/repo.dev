name: Train

on:
  workflow_dispatch:

jobs:
  train-and-commit:
    name: Train & Commit Models
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Train All Models (Unified Pipeline)
        run: python scripts/train.py
        env:
          TF_CPP_MIN_LOG_LEVEL: 2 

      - name: Commit and Push Models
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add app/src/main/assets/mlbb_hero_classifier.tflite
          git add app/src/main/assets/hero_classifier_labels.txt
          git add app/src/main/assets/mlbb_ui_detector.tflite
          
          if git diff --staged --quiet; then
            echo "No changes detected in models. Skipping commit."
          else
            git commit -m "chore(ci): retrain and update TFLite models [skip ci]"
            git push
          fi
