name: Train TFLite

on:
  workflow_dispatch:

jobs:
  train-model:
    name: Train Models
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Train Hero Classifier
        run: python scripts/train.hero.py
        env:
          TF_CPP_MIN_LOG_LEVEL: 2 

      - name: Train UI Detector (YOLOv8)
        run: python scripts/train.ui.py

      - name: Upload TFLite Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlbb-tflite-artifacts
          path: |
            app/src/main/assets/mlbb_hero_classifier.tflite
            app/src/main/assets/hero_classifier_labels.txt
            runs/detect/mlbb_yolo_v2/weights/best.tflite
            dataset.yaml
          if-no-files-found: error
          retention-days: 90
