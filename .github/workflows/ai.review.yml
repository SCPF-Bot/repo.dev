name: Combined AI Code Review (Ollama then GitHub Models)
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  job1_ollama_review:
    name: Job 1 - Ollama local model review and fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Free disk space
        uses: ggml-org/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
          swap-storage: false
          tool-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

      - name: Pull small code model (Qwen2.5-Coder 1.5B)
        run: ollama pull qwen2.5-coder:1.5b

      - name: Run full code review and auto-fix with Ollama
        run: |
          echo "AI_REVIEW_PROVIDER=ollama" >> .env.local
          npx ai-review-pipeline --full --fix --recursive \
            --extensions .kt,.java,.xml,.gradle,.kts,.properties \
            --exclude ".gitignore"

      - name: Save Ollama fixes to a branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b ai-fix-ollama
          git add .
          git commit -m "Ollama AI: automated fixes (first pass)" || echo "No changes to commit"
          git push origin ai-fix-ollama --force

  job2_github_models_review:
    name: Job 2 - GitHub Models second review and fix
    runs-on: ubuntu-latest
    needs: job1_ollama_review
    steps:
      - name: Checkout branch from job 1
        uses: actions/checkout@v4
        with:
          ref: ai-fix-ollama
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure GitHub Models (Claude 3.5 Sonnet)
        run: |
          echo "AI_REVIEW_PROVIDER=custom" >> .env.local
          echo "AI_REVIEW_BASE_URL=https://models.inference.ai.azure.com" >> .env.local
          echo "AI_REVIEW_API_KEY=${{ secrets.GITHUB_TOKEN }}" >> .env.local
          echo "AI_REVIEW_MODEL=claude-3-5-sonnet-20241022" >> .env.local

      - name: Run full code review and auto-fix with GitHub Models
        run: |
          npx ai-review-pipeline --full --fix --recursive \
            --extensions .kt,.java,.xml,.gradle,.kts,.properties \
            --exclude ".gitignore"

      - name: Commit second round of fixes to the same branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "GitHub Models Claude: additional fixes (second pass)" || echo "No additional changes"
          git push origin ai-fix-ollama

  job3_create_pr:
    name: Job 3 - Create pull request to main
    runs-on: ubuntu-latest
    needs: job2_github_models_review
    steps:
      - name: Checkout final fixed branch
        uses: actions/checkout@v4
        with:
          ref: ai-fix-ollama
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-fix-ollama
          base: main
          title: "AI Code Review: combined fixes from Ollama and GitHub Models"
          body: |
            This pull request was created automatically after two rounds of AI code review on the whole codebase.

            Round 1 - Ollama (Qwen2.5-Coder local model):
            - Freed disk space, installed Ollama, pulled a small model.
            - Reviewed and fixed all Kotlin, Java, XML, Gradle, and properties files.
            - Changes saved to branch ai-fix-ollama.

            Round 2 - GitHub Models (Claude 3.5 Sonnet):
            - Used the branch from round 1 as starting point.
            - Performed another exhaustive review and auto-fix pass.
            - Additional fixes committed on top of Ollama's work.

            What was fixed:
            - Logic errors, style issues, security problems, performance improvements.
            - All changes respect the .gitignore file.

            Please review the changes before merging.
          delete-branch: true
          labels: |
            automated-pr
            ollama
            github-models
            two-pass-review
