name: AI Code Review (Both Passes)
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  full_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Free disk space
        uses: ggml-org/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
          swap-storage: false
          tool-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------- PASS 1: ai-review-pipeline (built-in free model) ----------
      - name: Pass 1 - ai-review-pipeline (auto-fix)
        continue-on-error: true
        run: |
          npx ai-review-pipeline@latest --full --fix --recursive \
            --extensions .kt,.java,.xml,.gradle,.kts,.properties \
            --exclude ".gitignore"

      # ---------- PASS 2: GitHub Models (Claude) ----------
      - name: Pass 2 - GitHub Models second pass fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find all Kotlin/Java/Android files
          find . -type f \( -name "*.kt" -o -name "*.java" -o -name "*.xml" -o -name "*.gradle" -o -name "*.kts" -o -name "*.properties" \) > all_files.txt
          
          # Basic .gitignore exclusion
          if [ -f .gitignore ]; then
            while IFS= read -r pattern; do
              sed -i "\|$pattern|d" all_files.txt 2>/dev/null || true
            done < .gitignore
          fi

          while IFS= read -r file; do
            echo "Second pass (Claude): fixing $file"
            content=$(cat "$file")
            # Skip empty files
            if [ -z "$content" ]; then continue; fi
            
            # Call GitHub Models API
            response=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions?api-version=2024-02-15-preview" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -d "$(jq -n \
                --arg model "claude-3-5-sonnet-20241022" \
                --arg system "You are an Android/Kotlin expert. Fix any remaining bugs, style issues, security problems, or performance problems. Output ONLY the corrected file content, nothing else. Do not change business logic." \
                --arg user "$content" \
                '{model: $model, messages: [{role: "system", content: $system}, {role: "user", content: $user}], max_tokens: 4096, temperature: 0.2}')")
            
            fixed=$(echo "$response" | jq -r '.choices[0].message.content // empty')
            if [ -n "$fixed" ] && [ "$fixed" != "null" ]; then
              echo "$fixed" > "$file"
              echo "Updated $file"
            else
              echo "No fix from Claude for $file (response: $response)"
            fi
            sleep 1  # avoid rate limits
          done < all_files.txt

      # ---------- CREATE PULL REQUEST ----------
      - name: Create Pull Request with all fixes
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-code-review-full
          base: ${{ github.ref_name }}
          title: "AI Code Review: Two-pass fixes (Pipeline + Claude)"
          body: |
            This PR contains automated fixes from two AI passes:

            **Pass 1:** ai-review-pipeline (built-in free model) – full codebase scan and auto-fix
            **Pass 2:** GitHub Models (Claude 3.5 Sonnet) – second pass review and additional fixes

            All Kotlin, Java, XML, Gradle, and properties files were reviewed.
            Please review changes before merging.
          delete-branch: true
          labels: ai-review, two-pass
