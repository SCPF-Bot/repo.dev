name: AI Code Review
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  exhaustive_ai_review:
    name: AI-Powered Code Review & Fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Free disk space
        uses: ggml-org/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
          swap-storage: false
          tool-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # First pass: ai-review-pipeline with its built-in free model
      - name: First pass - AI Review Pipeline
        run: |
          npx ai-review-pipeline@latest --full --fix --recursive \
            --extensions .kt,.java,.xml,.gradle,.kts,.properties \
            --exclude ".gitignore"

      # Second pass: GitHub Models for additional review
      - name: Second pass - GitHub Models review
        id: ai-review-pass2
        uses: actions/ai-inference@v1
        with:
          model: mistralai/codestral-2505
          system-prompt: |
            You are an Android/Kotlin expert. Review the codebase for bugs, style, security, and performance.
            Output a concise list of remaining issues after the first pass. Focus on critical problems only.
          prompt: |
            Repository: ${{ github.repository }}
            Files changed: $(git diff --name-only)
            Please suggest specific fixes for any issues you find.

      - name: Create Pull Request with fixes
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI: Automated code review fixes"
          title: "AI Code Review: Automated improvements"
          body: |
            This PR automatically applies fixes generated by:

            1. **ai-review-pipeline** (built-in AI model) - first pass
            2. **GitHub Models (Codestral)** - second pass review

            Changes focus on logic, style, security, and performance.
          branch: ai-code-review-fixes
          base: main
          delete-branch: true
          labels: automated, ai-review
