name: AI Code Review

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  exhaustive_ai_review:
    name: AI-Powered Code Review & Fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Free disk space
        uses: ggml-org/free-disk-space@main
        with:
          large-packages: true
          docker-images: true
          swap-storage: false
          tool-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run AI Code Review Pipeline
        run: |
          npx ai-review-pipeline@latest --full --fix --recursive \
            --extensions .kt,.java,.xml,.gradle,.kts,.properties \
            --exclude ".gitignore"

      - name: Create Pull Request with AI Fixes
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "AI: Automated code review fixes"
          title: "AI Code Review: Automated improvements"
          body: |
            This PR automatically applies fixes generated by the `ai-review-pipeline` tool.

            Changes focus on logic, style, security, and performance.
          branch: ai-code-review-fixes
          base: main
          delete-branch: true
          labels: automated, ai-review
