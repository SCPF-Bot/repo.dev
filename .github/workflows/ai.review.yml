name: AI Full Repository Refactor (3-Pass)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  job1_ascending:
    runs-on: ubuntu-latest
    outputs:
      temp_branch: ${{ steps.branch.outputs.temp_branch }}
    steps:
      - name: Create or checkout temporary branch
        id: branch
        run: |
          TEMP_BRANCH="refactor-temp-${{ github.run_id }}"
          echo "temp_branch=$TEMP_BRANCH" >> $GITHUB_OUTPUT
          git clone --branch main ${{ github.server_url }}/${{ github.repository }} repo
          cd repo
          git checkout -b $TEMP_BRANCH || git checkout $TEMP_BRANCH
          echo "REPO_PATH=$(pwd)" >> $GITHUB_ENV
      - name: Set up JDK 17
        run: |
          cd repo
          # Assuming Java setup; adjust if needed
          sudo apt update && sudo apt install -y openjdk-17-jdk
      - name: Run Python script (ascending order)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORDER: ascending
        run: |
          cd repo
          python3 .github/workflows/python.code.001.py
      - name: Push changes to temporary branch
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Pass 1: ascending order changes"
          git push origin ${{ steps.branch.outputs.temp_branch }} --force

  job2_descending:
    needs: job1_ascending
    runs-on: ubuntu-latest
    steps:
      - name: Checkout temporary branch from previous job
        run: |
          git clone --branch ${{ needs.job1_ascending.outputs.temp_branch }} ${{ github.server_url }}/${{ github.repository }} repo
          echo "REPO_PATH=$(pwd)/repo" >> $GITHUB_ENV
      - name: Set up JDK 17
        run: |
          cd repo
          sudo apt update && sudo apt install -y openjdk-17-jdk
      - name: Run Python script (descending order)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORDER: descending
        run: |
          cd repo
          python3 .github/workflows/python.code.001.py
      - name: Push changes to temporary branch
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Pass 2: descending order changes"
          git push origin ${{ needs.job1_ascending.outputs.temp_branch }} --force

  job3_ascending_and_pr:
    needs: job2_descending
    runs-on: ubuntu-latest
    steps:
      - name: Checkout temporary branch
        run: |
          git clone --branch ${{ needs.job1_ascending.outputs.temp_branch }} ${{ github.server_url }}/${{ github.repository }} repo
          echo "REPO_PATH=$(pwd)/repo" >> $GITHUB_ENV
      - name: Set up JDK 17
        run: |
          cd repo
          sudo apt update && sudo apt install -y openjdk-17-jdk
      - name: Run Python script (ascending order again)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORDER: ascending
        run: |
          cd repo
          python3 .github/workflows/python.code.001.py
      - name: Push final changes and create Pull Request
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Pass 3: final ascending order changes"
          git push origin ${{ needs.job1_ascending.outputs.temp_branch }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 AI Refactor: 3-pass automated improvements"
          title: "🤖 AI Refactor: 3-Pass Code Enhancements (Ascending → Descending → Ascending)"
          body: |
            This PR was generated by a 3‑pass AI workflow:
            - **Pass 1**: Files processed in ascending order (alphabetical)
            - **Pass 2**: Files processed in descending order (reverse alphabetical)
            - **Pass 3**: Files processed in ascending order again

            This approach allows later passes to adapt to changes made in earlier passes, improving cross‑file consistency.

            Please review carefully before merging.
          branch: ${{ needs.job1_ascending.outputs.temp_branch }}
          base: main
          delete-branch: true
