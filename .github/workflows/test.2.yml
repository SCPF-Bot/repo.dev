# .github/workflows/extract-7z.yml
name: Extract 7z Archives

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  workflows: write          # <-- add this line

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Find and extract .7z files (including hidden)
        run: |
          find . -maxdepth 1 -type f \( -name "*.7z" -o -name ".*.7z" \) | while read archive; do
            echo "Extracting $archive ..."
            7z x "$archive" -aoa
          done
        working-directory: ${{ github.workspace }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Extract .7z archives [skip ci]"
            git push origin main
          fi
