# .github/workflows/extract-7z.yml
name: Extract 7z Archives and Create PR

on:
  workflow_dispatch:          # manual trigger from GitHub UI
  schedule:
    - cron: '0 0 * * *'       # daily at midnight UTC – adjust as needed

# No special permissions needed here because we will use a PAT
# that already has the required scopes.

jobs:
  extract-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Find and extract .7z files (including hidden)
        run: |
          # Find all .7z files in the root (both visible and hidden)
          find . -maxdepth 1 -type f \( -name "*.7z" -o -name ".*.7z" \) | while read archive; do
            echo "Extracting $archive ..."
            7z x "$archive" -aoa          # -aoa = overwrite existing files
          done
        working-directory: ${{ github.workspace }}

      # Optional: delete the .7z files after extraction – uncomment if needed
      # - name: Delete extracted .7z files
      #   run: rm -f *.7z .*.7z
      #   working-directory: ${{ github.workspace }}

      - name: Check for changes
        id: check
        run: |
          if git status --porcelain | grep -q '^'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # IMPORTANT: Use a Classic PAT with 'repo' and 'workflow' scopes.
          # Do NOT use GITHUB_TOKEN – it is blocked from modifying workflow files.
          token: ${{ secrets.ACTIONS_PAT }}
          commit-message: "Extract .7z archives"
          branch: extract-7z-${{ github.run_id }}
          base: main
          title: "Extract .7z archives"
          body: |
            This PR extracts all `.7z` files found in the repository root (including hidden ones like `.*.7z`).
            
            - Extracted with `7z x -aoa` (overwrites existing files).
            - After merging, the extracted content will be available in `main`.
          delete-branch: true
          labels: automated
