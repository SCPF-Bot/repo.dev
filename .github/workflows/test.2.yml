# .github/workflows/extract-7z.yml
name: Extract 7z Archives

on:
  workflow_dispatch:      # manual trigger from GitHub UI
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC – adjust as needed

permissions:
  contents: write          # required to push back to main

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          # Fetch full history to allow committing later
          fetch-depth: 0

      - name: Install 7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Find and extract .7z files in root
        run: |
          # Loop over all .7z files in the repository root (excluding .github/)
          for archive in *.7z; do
            # Skip if no .7z files exist
            [ -e "$archive" ] || continue
            echo "Extracting $archive ..."
            # Extract with overwrite (newer files replace existing ones)
            7z x "$archive" -aoa
          done
        working-directory: ${{ github.workspace }}

      # Optional: remove extracted .7z files after successful extraction
      # Uncomment the next block if you want to delete them
      # - name: Delete processed .7z files
      #   run: rm -f *.7z
      #   working-directory: ${{ github.workspace }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Extract .7z archives [skip ci]"
            git push origin main
          fi
