version: 2
updates:
  # Gradle / Kotlin — covers libs.versions.toml (version catalog) and build.gradle.kts
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Singapore"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    groups:
      # Bundle all Compose / AndroidX updates into one PR per cycle to reduce noise
      compose:
        patterns:
          - "androidx.compose*"
          - "androidx.activity*"
          - "androidx.lifecycle*"
          - "androidx.navigation*"
          - "androidx.work*"
          - "androidx.hilt*"
      # Bundle all testing library updates
      testing:
        patterns:
          - "junit*"
          - "io.mockk*"
          - "app.cash.turbine*"
          - "org.robolectric*"
          - "androidx.test*"
          - "io.github.takahirom.roborazzi*"
      # Bundle all UI enhancement libraries
      ui-enhancements:
        patterns:
          - "com.valentinilk.shimmer*"
          - "io.github.ehsannarmani*"
          - "com.airbnb.android*"
          - "com.github.skydoves*"
      # Google / Firebase / ML Kit
      google:
        patterns:
          - "com.google.*"
          - "com.google.mlkit*"
          - "com.google.firebase*"
          - "com.google.dagger*"

  # GitHub Actions — keeps workflow runner versions up to date
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Singapore"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
